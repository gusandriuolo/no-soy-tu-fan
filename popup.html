<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No soy tu Fan</title>
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        :root {
            --bg:        #0c0c0f;
            --bg2:       #13131a;
            --bg3:       #1a1a24;
            --border:    rgba(255,255,255,0.07);
            --accent:    #ff3b5c;
            --accent2:   #ff6b35;
            --teal:      #00e5c8;
            --text:      #e8e8ee;
            --muted:     #666680;
            --card-bg:   rgba(255,255,255,0.03);
            --radius:    10px;
        }

        body {
            width: 680px;
            min-height: 500px;
            max-height: 800px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Trebuchet MS', 'Lucida Grande', 'Gill Sans', sans-serif;
            font-size: 13px;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* ─── HEADER ─── */
        .header {
            padding: 18px 20px 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
        }

        .logo-text {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 18px;
            font-weight: bold;
            font-style: italic;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .logo-text span {
            color: var(--accent);
        }

        .btn-new {
            padding: 7px 14px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .btn-new:hover {
            border-color: rgba(255,59,92,0.4);
            color: var(--accent);
            background: rgba(255,59,92,0.06);
        }

        /* Stats bar */
        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1px 1fr 1px 1fr;
            gap: 0;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .stat-item {
            padding: 10px 14px;
            text-align: center;
        }

        .stat-divider {
            background: var(--border);
            align-self: stretch;
        }

        .stat-num {
            display: block;
            font-family: 'Courier New', Courier, monospace;
            font-size: 22px;
            font-weight: bold;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 3px;
        }

        .stat-num.teal { color: var(--teal); }

        .stat-label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        /* ─── SCAN BANNER ─── */
        .scan-banner {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 14px;
            background: rgba(255,59,92,0.08);
            border-bottom: 1px solid rgba(255,59,92,0.15);
            font-size: 12px;
        }

        .scan-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.7); }
        }

        .scan-text { color: var(--text); flex: 1; }
        .scan-pct  { font-family: 'Courier New', monospace; color: var(--accent); font-weight: bold; }

        .scan-bar-wrap {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
        }
        .scan-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        /* ─── CONTENT ─── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            max-height: 620px;
        }

        .content::-webkit-scrollbar { width: 5px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .content::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

        /* ─── IDLE STATE ─── */
        .idle-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 340px;
            text-align: center;
            padding: 30px;
        }

        .idle-big-icon {
            font-size: 52px;
            margin-bottom: 16px;
            line-height: 1;
        }

        .idle-title {
            font-family: Georgia, serif;
            font-size: 20px;
            font-style: italic;
            color: var(--text);
            margin-bottom: 8px;
        }

        .idle-sub {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 28px;
            max-width: 280px;
            line-height: 1.5;
        }

        .btn-start {
            padding: 14px 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(255,59,92,0.3);
        }
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(255,59,92,0.45);
        }
        .btn-start:active { transform: translateY(0); }

        .idle-note {
            margin-top: 14px;
            font-size: 11px;
            color: var(--muted);
        }

        /* ─── ANALYZING STATE ─── */
        .analyzing-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 340px;
            padding: 30px;
            text-align: center;
        }

        .spinner-ring {
            width: 52px;
            height: 52px;
            border: 3px solid rgba(255,59,92,0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .analyzing-msg {
            font-size: 14px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .analyzing-pct {
            font-family: 'Courier New', monospace;
            font-size: 36px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 14px;
            line-height: 1;
        }

        .progress-track {
            width: 260px;
            height: 5px;
            background: rgba(255,255,255,0.07);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 14px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .analyzing-hint {
            font-size: 11px;
            color: var(--muted);
        }

        /* ─── TOOLBAR (results) ─── */
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 9px 12px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 12px;
            transition: border-color 0.2s;
        }
        .search-input::placeholder { color: var(--muted); }
        .search-input:focus {
            outline: none;
            border-color: rgba(255,59,92,0.4);
        }

        /* ─── TABS ─── */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
            text-align: center;
        }
        .tab:hover { border-color: rgba(255,59,92,0.3); color: var(--text); }
        .tab.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border-color: transparent;
        }

        /* ─── FILTERS ─── */
        .filters {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .filter-chip {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--muted);
            user-select: none;
        }
        .filter-chip input { cursor: pointer; accent-color: var(--accent); }
        .filter-chip:has(input:checked) {
            border-color: rgba(255,59,92,0.3);
            color: var(--text);
            background: rgba(255,59,92,0.06);
        }

        /* ─── ACTION BUTTONS ─── */
        .actions {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
        }

        .btn-action {
            flex: 1;
            padding: 8px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 7px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }
        .btn-action:hover {
            border-color: rgba(255,255,255,0.15);
            color: var(--text);
            background: rgba(255,255,255,0.05);
        }

        /* ─── USER CARDS ─── */
        .users-list { display: flex; flex-direction: column; gap: 6px; }

        .user-card {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 11px 13px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: all 0.2s;
        }
        .user-card:hover {
            background: rgba(255,59,92,0.05);
            border-color: rgba(255,59,92,0.2);
            transform: translateX(3px);
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
            border: 1.5px solid rgba(255,59,92,0.25);
        }

        .avatar-placeholder {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            border: 1.5px solid var(--border);
        }

        .user-info { flex: 1; min-width: 0; }

        .user-handle {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            display: block;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-handle:hover { text-decoration: underline; }

        .user-name {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }

        .badges { display: flex; gap: 5px; flex-wrap: wrap; }

        .badge {
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
        }
        .badge-verified { background: rgba(0,229,200,0.12); color: var(--teal); border: 1px solid rgba(0,229,200,0.2); }
        .badge-private  { background: rgba(240,173,78,0.12); color: #f0ad4e; border: 1px solid rgba(240,173,78,0.2); }

        .btn-star {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .btn-star:hover { border-color: rgba(240,173,78,0.4); background: rgba(240,173,78,0.08); }
        .btn-star.saved { background: linear-gradient(135deg, #f0ad4e, #ffd700); color: #000; border-color: #ffd700; }

        /* ─── EMPTY / ERROR ─── */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 13px;
        }
        .empty-icon { font-size: 36px; display: block; margin-bottom: 10px; }

        .error-box {
            background: rgba(255,59,92,0.08);
            border: 1px solid rgba(255,59,92,0.25);
            padding: 14px;
            border-radius: var(--radius);
            margin-bottom: 14px;
            font-size: 13px;
            color: #ff7a8a;
        }

        .btn-retry {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-retry:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="app" id="app"></div>
    <script src="popup.js"></script>
</body>
</html>
