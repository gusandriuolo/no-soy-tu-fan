<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No soy tu Fan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 700px;
            min-height: 500px;
            max-height: 800px;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-size: 14px;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .header {
            padding: 20px;
            background: linear-gradient(135deg, rgba(0, 149, 246, 0.1) 0%, rgba(0, 212, 255, 0.05) 100%);
            border-bottom: 1px solid rgba(0, 149, 246, 0.2);
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #00d4ff, #0095f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 13px;
            color: #aaa;
        }

        .stats-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .stat-header-item {
            background: rgba(0, 149, 246, 0.1);
            border: 1px solid rgba(0, 149, 246, 0.2);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-header-number {
            display: block;
            font-size: 28px;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 4px;
        }

        .stat-header-label {
            display: block;
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(0, 149, 246, 0.4);
            border-radius: 3px;
        }

        .content::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 149, 246, 0.6);
        }

        .content.loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .users-container {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .user-item {
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
            transition: all 0.25s ease;
            margin-bottom: 8px;
        }

        .user-item:hover {
            background: rgba(0, 149, 246, 0.1);
            border-color: rgba(0, 149, 246, 0.3);
            transform: translateX(4px);
        }

        .user-pic {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(0, 149, 246, 0.3);
            flex-shrink: 0;
        }

        .user-pic-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0, 149, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .username {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .username:hover {
            text-decoration: underline;
        }

        .fullname {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(0, 149, 246, 0.2);
            color: #0095f6;
            border: 1px solid rgba(0, 149, 246, 0.3);
        }

        .badge-verified {
            background: rgba(29, 185, 84, 0.2);
            color: #1db954;
            border-color: rgba(29, 185, 84, 0.3);
        }

        .badge-private {
            background: rgba(240, 173, 78, 0.2);
            color: #f0ad4e;
            border-color: rgba(240, 173, 78, 0.3);
        }

        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0095f6, #00d4ff);
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 149, 246, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-star {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .btn-star:hover {
            background: rgba(240, 173, 78, 0.2);
            border-color: rgba(240, 173, 78, 0.4);
        }

        .btn-star.active {
            background: linear-gradient(135deg, #f0ad4e, #ffd700);
            color: #000;
            border-color: #ffd700;
        }

        .btn-reset {
            background: transparent;
            color: #00d4ff;
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            font-size: 18px;
        }

        .btn-reset:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.5);
        }

        .search-box {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0, 149, 246, 0.2);
            border-radius: 10px;
            color: #fff;
            margin-bottom: 16px;
            font-size: 13px;
            transition: all 0.25s ease;
        }

        .search-box::placeholder {
            color: #666;
        }

        .search-box:focus {
            outline: none;
            border-color: rgba(0, 149, 246, 0.6);
            background: rgba(0, 149, 246, 0.05);
            box-shadow: 0 0 0 3px rgba(0, 149, 246, 0.1);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .tab-btn:hover {
            border-color: rgba(0, 149, 246, 0.4);
            background: rgba(0, 149, 246, 0.08);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #0095f6, #00d4ff);
            color: white;
            border-color: transparent;
        }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 12px;
            transition: all 0.25s ease;
        }

        .filter-label:hover {
            background: rgba(0, 149, 246, 0.08);
            border-color: rgba(0, 149, 246, 0.2);
        }

        .filter-label input {
            cursor: pointer;
            accent-color: #00d4ff;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .action-buttons button {
            flex: 1;
            padding: 10px;
            font-size: 12px;
        }

        .spinner {
            border: 4px solid rgba(0, 149, 246, 0.2);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .error {
            background: rgba(255, 59, 48, 0.15);
            border: 1px solid rgba(255, 59, 48, 0.3);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #ff6b6b;
        }

        .footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="app"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
